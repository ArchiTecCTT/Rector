name: CI

# Provider-free verification workflow for the Rector hardening path.
# Reproduces the local verification gates (test, build, type-check, issue-catalog drift)
# across a Node 22 / Node 24 matrix. Requires no provider secrets and performs no
# release side effects (no publish, tag, or push). Release tagging stays manual.

on:
  push:
    branches: [main, rector-0.1.0, rector-0.2.0]
  pull_request:
    branches: [main, rector-0.1.0, rector-0.2.0]

# Least privilege: read-only token cannot push commits, create tags, or publish releases.
permissions:
  contents: read

jobs:
  verify:
    name: Verify / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies (deterministic)
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run check

      - name: Issue catalog drift check
        run: node scripts/generate-roadmap-issues.js --check

      - name: Linear export drift check
        run: node scripts/export-linear-issues.js --check

      - name: Dependency audit
        run: npm audit

  coverage:
    name: Coverage / Codecov
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (deterministic)
        run: npm ci

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
